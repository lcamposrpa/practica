name: CI - Integracion Continua 

on: 
 push: 
 pull_request: 
  branches: [main] 
  
jobs: 
 build-y-pruebas: 
  runs-on: ubuntu-latest 
  steps: 
   - uses: actions/checkout@v4 
   - uses: actions/setup-python@v5 
     with: 
       python-version: "3.12" 
   - run: pip install -r requirements.txt 
   - run: pytest -v 
    
 desplegar: 
    needs: build-y-pruebas 
    if: github.ref == 'refs/heads/main' 
    runs-on: ubuntu-latest 
    steps: 
      - run: echo "Pruebas en verde. Desplegando a producción..."
